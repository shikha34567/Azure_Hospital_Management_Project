trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.x'
  displayName: 'Set up Python'

- script: |
    python -m pip install --upgrade pip
    pip install flask
  displayName: 'Install dependencies'

- script: |
    python -c "print('Azure Pipeline Success')"
  displayName: 'Run Python Script'
